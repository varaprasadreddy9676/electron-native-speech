<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>electron-native-speech demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --accent: #7c6aff;
      --accent-hover: #9a8bff;
      --text: #e8e8f0;
      --text-muted: #888898;
      --error: #ff6b6b;
      --success: #6bffb0;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 100px;
      background: var(--accent);
      color: white;
      letter-spacing: 0.04em;
    }

    #availability-bar {
      padding: 10px 28px;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
    }

    #availability-bar.ok { color: var(--success); }
    #availability-bar.error { color: var(--error); }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      overflow: hidden;
    }

    .panel {
      padding: 28px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .panel:last-child { border-right: none; }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .controls { display: flex; flex-direction: column; gap: 10px; }

    button {
      padding: 9px 18px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
    .btn-danger { background: #3a1a1a; color: var(--error); border: 1px solid #5a2a2a; }
    .btn-danger:hover:not(:disabled) { background: #4a2020; }

    #file-path {
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .locale-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .locale-row label { font-size: 13px; color: var(--text-muted); min-width: 50px; }

    select {
      flex: 1;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-size: 13px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .status-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-pill.listening .dot { background: var(--error); animation: pulse 1s infinite; }
    .status-pill.listening { color: var(--error); border-color: var(--error); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .transcript-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.7;
      min-height: 200px;
    }

    .segment {
      display: flex;
      gap: 12px;
      padding: 4px 0;
    }

    .segment .ts {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 60px;
      padding-top: 3px;
      font-variant-numeric: tabular-nums;
    }

    .segment .txt { flex: 1; }

    .interim {
      color: var(--text-muted);
      font-style: italic;
      padding: 4px 0;
    }

    .empty-hint {
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      margin-top: 40px;
    }

    .progress {
      font-size: 12px;
      color: var(--accent);
      padding: 4px 0;
    }

    footer {
      padding: 12px 28px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header>
    <h1>electron-native-speech</h1>
    <span class="badge">demo</span>
  </header>

  <div id="availability-bar">Checking availability...</div>

  <main>
    <!-- FILE TRANSCRIPTION -->
    <div class="panel">
      <div class="panel-title">File Transcription</div>

      <div class="controls">
        <button id="pick-file-btn" class="btn-secondary">Choose audio / video file…</button>
        <div id="file-path" style="display:none"></div>

        <div class="locale-row">
          <label>Locale</label>
          <select id="file-locale">
            <option value="en-US">en-US</option>
            <option value="en-GB">en-GB</option>
            <option value="fr-FR">fr-FR</option>
            <option value="de-DE">de-DE</option>
            <option value="es-ES">es-ES</option>
            <option value="it-IT">it-IT</option>
            <option value="ja-JP">ja-JP</option>
            <option value="zh-CN">zh-CN</option>
            <option value="pt-BR">pt-BR</option>
          </select>
        </div>

        <button id="transcribe-btn" class="btn-primary" disabled>Transcribe</button>
      </div>

      <div id="file-transcript" class="transcript-box">
        <p class="empty-hint">Select a file and click Transcribe.</p>
      </div>
    </div>

    <!-- LIVE MICROPHONE -->
    <div class="panel">
      <div class="panel-title">Live Microphone</div>

      <div class="controls">
        <div style="display:flex; gap:8px; align-items:center;">
          <span id="live-status" class="status-pill">
            <span class="dot"></span> idle
          </span>
        </div>

        <div class="locale-row">
          <label>Locale</label>
          <select id="live-locale">
            <option value="en-US">en-US</option>
            <option value="en-GB">en-GB</option>
            <option value="fr-FR">fr-FR</option>
            <option value="de-DE">de-DE</option>
            <option value="es-ES">es-ES</option>
            <option value="it-IT">it-IT</option>
            <option value="ja-JP">ja-JP</option>
            <option value="zh-CN">zh-CN</option>
            <option value="pt-BR">pt-BR</option>
          </select>
        </div>

        <div style="display:flex; gap:8px;">
          <button id="start-live-btn" class="btn-primary" style="flex:1">Start Listening</button>
          <button id="stop-live-btn" class="btn-danger" style="flex:1" disabled>Stop</button>
        </div>
      </div>

      <div id="live-transcript" class="transcript-box">
        <p class="empty-hint">Click "Start Listening" and speak.</p>
      </div>
    </div>
  </main>

  <footer>
    Native macOS speech recognition · No cloud · No API keys · electron-native-speech v0.1.0
  </footer>

  <script src="renderer.js"></script>
</body>
</html>
